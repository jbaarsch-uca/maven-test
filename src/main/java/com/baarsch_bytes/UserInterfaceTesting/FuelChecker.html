<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fuel Depot Dispatcher - Tank Checker</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 500px; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .failure { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #e2e3e5; color: #383d41; border: 1px solid #d6d8db; }
    </style>
</head>
<body>

<div class="container">
    <h2>Fuel Tank Checker</h2>
    
    <p id="tank-capacities"><small>Capacity: Low Volatility (1200L) | High Volatility (800L)</small></p>

    <div class="form-group">
        <label for="fuel-type">Fuel Type</label>
        <select id="fuel-type">
            <option value="">-- Select Type --</option>
            <option value="low">Low Volatility</option>
            <option value="high">High Volatility</option>
        </select>
    </div>

    <div class="form-group">
        <label for="fuel-amount">Amount (Litres)</label>
        <input type="number" id="fuel-amount" placeholder="Enter whole litres">
    </div>

    <button id="check-button" onclick="checkFuel()">Check Fit</button>
    <button id="exit-button" onclick="exitApp()" style="background:#6c757d;">Exit</button>

    <div id="result"></div>
</div>

<script>
    function checkFuel() {
        const type = document.getElementById('fuel-type').value;
        const amount = parseInt(document.getElementById('fuel-amount').value);
        const resultDiv = document.getElementById('result');
        
        resultDiv.style.display = 'block';

        // S1A7: Identify a user input data error
        if (!type || isNaN(amount) || amount <= 0) {
            resultDiv.className = 'failure';
            resultDiv.innerText = "Error: Please select a fuel type and enter a valid positive whole number.";
            return;
        }

        let limit = (type === 'low') ? 1200 : 800;

        // S1A1 - S1A4: Check Fit Logic
        if (amount <= limit) {
            resultDiv.className = 'success';
            resultDiv.innerText = `ACCEPT: ${amount}L of ${type} volatility fuel fits in the tank (Max: ${limit}L).`;
        } else {
            resultDiv.className = 'failure';
            resultDiv.innerText = `REJECT: ${amount}L exceeds the ${limit}L capacity for ${type} volatility fuel.`;
        }
    }

    // S1A6: Exit Application
    function exitApp() {
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = 'info';
        resultDiv.innerText = "Session ended. Thank you, Dispatcher.";
        document.getElementById('check-button').disabled = true;
    }
</script>

</body>
</html>
